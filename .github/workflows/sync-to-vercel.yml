name: Sync to Vercel Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Vercel repo
        run: |
          git remote add vercel-repo https://x-access-token:${{ secrets.VERCEL_REPO_TOKEN }}@github.com/0812zyt/Refrigerator-Manager.git
          git push vercel-repo main --force
